# =====================================================
# ClawHub 生产环境 Docker Compose 配置
# 覆盖开发环境的配置
# =====================================================

version: '3.8'

services:
  postgres:
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  redis:
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M

  minio:
    restart: always
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      target: production
    restart: always
    environment:
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WORKERS: ${WORKERS:-4}
    deploy:
      replicas: ${BACKEND_REPLICAS:-2}
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    command: >
      sh -c "
      uv run alembic upgrade head &&
      uv run gunicorn app.main:app -w ${WORKERS:-4} -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --access-logfile - --error-logfile -
      "

  frontend:
    build:
      target: production
    restart: always
    deploy:
      replicas: ${FRONTEND_REPLICAS:-2}
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  nginx:
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    deploy:
      resources:
        limits:
          memory: 256M

  # 生产环境监控服务
  prometheus:
    image: prom/prometheus:latest
    container_name: clawhub-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - clawhub-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: clawhub-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - clawhub-network
    profiles:
      - monitoring

  # 备份服务
  backup:
    image: offen/docker-volume-backup:latest
    container_name: clawhub-backup
    restart: always
    environment:
      BACKUP_CRON_EXPRESSION: "0 2 * * *"
      BACKUP_RETENTION_DAYS: "30"
      AWS_S3_BUCKET_NAME: ${BACKUP_S3_BUCKET:-clawhub-backups}
      AWS_ACCESS_KEY_ID: ${BACKUP_AWS_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_AWS_SECRET_KEY}
      AWS_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT}
      BACKUP_ARCHIVE: /backup/archive
    volumes:
      - postgres_data:/backup/postgres:ro
      - minio_data:/backup/minio:ro
    networks:
      - clawhub-network
    profiles:
      - backup

volumes:
  nginx_cache:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
