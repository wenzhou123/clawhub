version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: clawhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clawhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clawhub_secret}
      POSTGRES_DB: ${POSTGRES_DB:-clawhub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clawhub} -d ${POSTGRES_DB:-clawhub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clawhub-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: clawhub-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-clawhub_redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clawhub-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: clawhub-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-clawhub}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-clawhub_minio_secret}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - clawhub-network

  # 创建 MinIO 存储桶
  minio-create-bucket:
    image: minio/mc:latest
    container_name: clawhub-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 ${MINIO_ROOT_USER:-clawhub} ${MINIO_ROOT_PASSWORD:-clawhub_minio_secret};
      /usr/bin/mc mb --ignore-existing myminio/${MINIO_BUCKET_NAME:-clawhub-storage};
      /usr/bin/mc policy set public myminio/${MINIO_BUCKET_NAME:-clawhub-storage};
      exit 0;
      "
    networks:
      - clawhub-network

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clawhub-backend
    restart: unless-stopped
    environment:
      # 数据库配置
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-clawhub}:${POSTGRES_PASSWORD:-clawhub_secret}@postgres:5432/${POSTGRES_DB:-clawhub}
      # Redis 配置
      REDIS_URL: redis://:${REDIS_PASSWORD:-clawhub_redis_secret}@redis:6379/0
      # MinIO 配置
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-clawhub}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-clawhub_minio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET_NAME:-clawhub-storage}
      MINIO_SECURE: "false"
      # 应用配置
      DEBUG: ${DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      # CORS 配置
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      # 日志配置
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - clawhub-network
    command: >
      sh -c "
      uv run alembic upgrade head &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # 前端开发服务器
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: clawhub-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-ws://localhost:8000}
      VITE_MINIO_ENDPOINT: ${VITE_MINIO_ENDPOINT:-localhost:9000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    networks:
      - clawhub-network
    command: npm run dev -- --host 0.0.0.0

  # Nginx 反向代理（生产环境使用）
  nginx:
    image: nginx:alpine
    container_name: clawhub-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - clawhub-network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  backend_venv:
    driver: local

networks:
  clawhub-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
